name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Use `npm install` (not `npm ci`) to work around the known Rollup/npm bug
      # where a lockfile generated on one OS is missing the optional native binary
      # for another OS (e.g. lockfile from Windows lacks @rollup/rollup-linux-x64-gnu).
      # See: https://github.com/npm/cli/issues/4828
      - run: npm install --no-audit --no-fund

      - run: npm run build:production
        env:
          VITE_BASE_PATH: /kona-biz/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
